title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Thank you for reporting a bug!
        Please provide as much clear detail as possible so our team can investigate and fix it quickly.

  - type: input
    id: environment
    attributes:
      label: Environment / Version
      description: What version or environment did this happen on?
      placeholder: e.g., Production, Staging, v1.4.2
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS did you experience this on?
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser did you experience this on? (Leave as N/A if not applicable.)
      options:
        - N/A
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity Level
      description: How critical is this issue to your workflow?
      options:
        - "Low (Cosmetic / minor annoyance)"
        - "Medium (Functionality is impaired, but a workaround exists)"
        - "High (Core feature broken / completely blocked)"
        - "Critical (Data loss / security issue)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: Provide a clear and concise description of what the problem is and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: Tell us exactly how to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Stack Trace / Screenshots
      description: Paste any relevant log output, error messages, or stack traces. This will be automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Code of Conduct & Verification
      options:
        - label: I have checked that this bug has not already been reported by someone else.
          required: true
        - label: I agree to follow this organization's Code of Conduct.
          required: true
